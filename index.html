<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Menu Planner</title>
<style>
:root{ color-scheme: light; }
body{
  --bg:#f7f6f3; --card:#ffffff; --ink:#23211d; --muted:#7a766d;
  --line:#e7e3db; --accent:#c8612f; --accent-soft:#fbeee5;
  --breakfast:#e8a13c; --sabji:#4c9a6b; --nonRoutine:#5b7fc4; --sides:#b25fae;
  --chip:#f0ede6; --good:#e6f4ea; --good-ink:#2f7d4f; --danger:#c0392b; --row:#faf9f6;
  --r-red:#fcf1ef; --r-red-b:#d2685c; --r-yel:#fdf6e9; --r-yel-b:#cfa23c; --r-grn:#eff6f1; --r-grn-b:#4c9a6b;
}
body.dark{
  --bg:#1b1a17; --card:#262420; --ink:#ece9e2; --muted:#a39d92;
  --line:#3a3731; --accent:#e0793f; --accent-soft:#3a2a1e;
  --breakfast:#e8a13c; --sabji:#5cb37e; --nonRoutine:#7396d6; --sides:#c477bf;
  --chip:#332f29; --good:#1f3a29; --good-ink:#7fd6a0; --danger:#e07a6e; --row:#211f1b;
  --r-red:#2c2421; --r-red-b:#b5675b; --r-yel:#2c2920; --r-yel-b:#c7a24f; --r-grn:#212a24; --r-grn-b:#5aa97b;
}
*{box-sizing:border-box; margin:0; padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  background:var(--bg); color:var(--ink); line-height:1.45; -webkit-font-smoothing:antialiased; transition:background .2s,color .2s;}
.app{display:flex; min-height:100vh;}
/* ---- left nav ---- */
.nav{width:200px; flex-shrink:0; background:var(--card); border-right:1px solid var(--line);
  padding:18px 12px; display:flex; flex-direction:column; gap:4px;}
.nav .brand{font-size:17px; font-weight:750; padding:6px 8px 14px; letter-spacing:-.3px;}
.nav button{display:flex; align-items:center; gap:10px; width:100%; text-align:left; border:none;
  background:transparent; color:var(--muted); padding:10px 12px; border-radius:10px; font-size:14px; font-weight:600; cursor:pointer; font-family:inherit;}
.nav button:hover{background:var(--bg);}
.nav button.active{background:var(--ink); color:var(--card);}
.nav .ico{font-size:16px;}
.nav .theme{margin-top:auto;}
/* ---- main ---- */
.main{flex:1; padding:22px 26px 60px; min-width:0;}
.viewhead{display:flex; align-items:center; justify-content:space-between; gap:12px; margin-bottom:14px; flex-wrap:wrap;}
.viewhead h2{font-size:21px; letter-spacing:-.3px;}
.viewhead p.sub{color:var(--muted); font-size:13px;}
.view{display:none;} .view.active{display:block;}
.btn{border:1px solid var(--line); background:var(--card); padding:8px 14px; border-radius:9px; font-size:13px; font-weight:650; cursor:pointer; color:var(--ink); font-family:inherit;}
.btn.primary{background:var(--accent); color:#fff; border-color:var(--accent);}
.btn.ghost{background:transparent;}
.btn.danger{color:var(--danger); border-color:var(--line);}
.toolbar{display:flex; gap:8px; flex-wrap:wrap; align-items:center;}
.switch{display:inline-flex; align-items:center; gap:7px; font-size:13px; font-weight:650; color:var(--ink); cursor:pointer; user-select:none; padding:6px 12px; border:1px solid var(--line); border-radius:9px; background:var(--card);}
.switch input{position:absolute; opacity:0; width:0; height:0;}
.switch .track{position:relative; width:34px; height:19px; border-radius:999px; background:var(--line); transition:background .15s; flex-shrink:0;}
.switch .track::after{content:""; position:absolute; top:2px; left:2px; width:15px; height:15px; border-radius:50%; background:#fff; transition:transform .15s; box-shadow:0 1px 2px rgba(0,0,0,.3);}
.switch input:checked + .track{background:var(--sabji);}
.switch input:checked + .track::after{transform:translateX(15px);}
.switch:has(input:checked){border-color:var(--sabji); color:var(--sabji);}
/* ---- library two-pane ---- */
.libwrap{display:flex; gap:18px; align-items:flex-start;}
.catcol{width:210px; flex-shrink:0; background:var(--card); border:1px solid var(--line); border-radius:14px; padding:8px; position:sticky; top:14px;}
.catcol .cap{font-size:10.5px; text-transform:uppercase; letter-spacing:.5px; color:var(--muted); font-weight:700; padding:8px 11px 4px;}
.catcol button{display:flex; align-items:center; gap:9px; width:100%; text-align:left; border:none; background:transparent; padding:9px 11px; border-radius:9px; cursor:pointer; font-size:13.5px; font-weight:600; color:var(--ink); font-family:inherit;}
.catcol button:hover{background:var(--bg);}
.catcol button.active{background:var(--accent-soft); color:var(--accent);}
.catcol .cdot{width:10px; height:10px; border-radius:3px; flex-shrink:0;}
.catcol .cnt{margin-left:auto; font-size:11px; color:var(--muted); background:var(--chip); border-radius:999px; padding:1px 8px;}
.catcol button.active .cnt{background:var(--card);}
.blockcol{flex:1; min-width:0;}
.libbar{display:flex; gap:8px; align-items:center; margin-bottom:12px; flex-wrap:wrap;}
.libbar h3{font-size:16px; margin-right:auto; display:flex; align-items:center; gap:8px;}
.search{border:1px solid var(--line); border-radius:9px; padding:7px 11px; font-size:13px; background:var(--card); color:var(--ink); font-family:inherit; width:170px;}
/* ---- blocks ---- */
.blocks{display:grid; grid-template-columns:repeat(auto-fill,minmax(300px,340px)); gap:14px; justify-content:start;}
.block{position:relative; display:flex; align-items:stretch; height:104px; background:var(--card); border:1px solid var(--line); border-radius:14px; overflow:hidden; cursor:pointer; transition:box-shadow .16s, transform .16s, background .16s;}
.block:hover{box-shadow:0 7px 20px rgba(0,0,0,.10); transform:translateY(-2px);}
body.dark .block:hover{box-shadow:0 7px 20px rgba(0,0,0,.45);}
.block.rate-dislike{background:var(--r-red);}
.block.rate-ok{background:var(--r-yel);}
.block.rate-love{background:var(--r-grn);}
.block .thumb{width:40%; min-width:100px; max-width:180px; flex-shrink:0; display:flex; align-items:center; justify-content:center; font-size:32px; background:rgba(0,0,0,.05); overflow:hidden;}
.block .thumb img{width:100%; height:100%; object-fit:cover;}
.block .body{position:relative; flex:1; min-width:0; padding:12px 14px; display:flex; flex-direction:column; gap:7px; border-left:1px solid var(--line);}
.block.rate-dislike .body{box-shadow:inset 3px 0 0 var(--r-red-b);}
.block.rate-ok .body{box-shadow:inset 3px 0 0 var(--r-yel-b);}
.block.rate-love .body{box-shadow:inset 3px 0 0 var(--r-grn-b);}
.block .body h4{font-size:14.5px; font-weight:650; line-height:1.25; color:var(--ink); letter-spacing:-.1px;}
.block .body .note{font-size:11px; color:var(--muted);}
.block .tags{display:flex; gap:4px; flex-wrap:wrap;}
.meters{display:flex; flex-direction:column; gap:5px; margin-top:auto;}
.meters .m{display:grid; grid-template-columns:50px 1fr; align-items:center; gap:9px;}
.meters .lbl{font-size:9px; text-transform:uppercase; letter-spacing:.6px; font-weight:700; color:var(--muted);}
.meters .bar{display:inline-flex; gap:4px; align-items:center;}
.meters .bar i{width:7px; height:7px; border-radius:50%; background:currentColor; opacity:.18; display:block;}
.meters .bar i.on{opacity:1;}
.meters .bar.health{color:#3a9d63;} .meters .bar.protein{color:#5b7fc4;}
body.dark .meters .bar.health{color:#5cb37e;} body.dark .meters .bar.protein{color:#7396d6;}
.rate{position:absolute; bottom:7px; right:7px; display:none; gap:1px; background:var(--card); border:1px solid var(--line); border-radius:999px; padding:3px 5px; box-shadow:0 2px 9px rgba(0,0,0,.2); z-index:2;}
.block:hover .rate{display:flex;}
.rate button{border:none; background:transparent; font-size:14px; line-height:1; cursor:pointer; opacity:.45; padding:2px 3px; border-radius:50%; transition:opacity .12s, transform .1s;}
.rate button:hover{opacity:1; transform:scale(1.2);}
.rate button.on{opacity:1; transform:scale(1.2);}
.block .del{position:absolute; top:5px; right:6px; width:21px; height:21px; border-radius:50%; border:none; background:rgba(255,255,255,.9); color:var(--muted); font-size:12px; line-height:1; cursor:pointer; display:none; align-items:center; justify-content:center; box-shadow:0 1px 3px rgba(0,0,0,.18);}
.block:hover .del{display:flex;} .block .del:hover{color:var(--danger);}
body.dark .block .del{background:rgba(0,0,0,.5); color:var(--ink);}
.addblock{display:flex; align-items:center; justify-content:center; gap:8px; border:1.5px dashed var(--line); border-radius:13px; cursor:pointer; color:var(--muted); font-weight:650; font-size:13.5px; min-height:108px; background:transparent;}
.addblock:hover{border-color:var(--accent); color:var(--accent);}
.tag{font-size:10px; font-weight:700; padding:2px 7px; border-radius:999px; background:var(--chip); color:var(--muted); text-transform:uppercase; letter-spacing:.3px;}
.tag.roti{background:#fdeedd; color:#9a5618;} .tag.rice{background:#e7f0fb; color:#34608f;}
body.dark .tag.roti{background:#43321f; color:#e8a96a;} body.dark .tag.rice{background:#22344a; color:#8bb6e6;}
.muted{color:var(--muted); font-size:12.5px;}
/* ---- planner calendar ---- */
.hint{font-size:12px; color:var(--muted); margin:0 0 14px;}
select{width:100%; border:1px solid var(--line); border-radius:8px; padding:6px 7px; font-size:12.5px; background:var(--card); color:var(--ink); font-family:inherit;}
.planwrap{overflow-x:auto; padding-bottom:6px;}
.planboard{display:flex; gap:12px; align-items:flex-start; min-width:max-content;}
.pday{flex:1; min-width:150px; display:flex; flex-direction:column; background:var(--card); border:1px solid var(--line); border-radius:14px; overflow:hidden; box-shadow:0 1px 2px rgba(0,0,0,.05), 0 8px 20px rgba(0,0,0,.05);}
body.dark .pday{box-shadow:0 2px 4px rgba(0,0,0,.25), 0 10px 24px rgba(0,0,0,.32);}
.pday.today{border-color:var(--accent); box-shadow:0 0 0 1.5px var(--accent), 0 8px 20px rgba(0,0,0,.10);}
.pday-head{padding:11px 8px; display:flex; flex-direction:column; align-items:center; gap:1px; border-bottom:1px solid var(--line);}
.pday-head .pd-day{font-size:10px; font-weight:700; letter-spacing:.5px; text-transform:uppercase; color:var(--muted);}
.pday-head .pd-num{font-size:17px; font-weight:750; color:var(--ink); line-height:1;}
.pday.today .pday-head{background:var(--accent-soft);}
.pday.today .pday-head .pd-day,.pday.today .pday-head .pd-num{color:var(--accent);}
.pgroup{padding:18px 10px; display:flex; flex-direction:column; gap:7px;}
.pgroup + .pgroup{border-top:1px solid var(--line);}
.pglabel{display:flex; align-items:center; gap:6px; font-size:9.5px; font-weight:700; letter-spacing:.6px; text-transform:uppercase; color:var(--muted);}
.pglabel .mdot{width:8px; height:8px; border-radius:2px; flex-shrink:0;}
.pgroup .pcard,.pgroup .padd,.pstack .pcard,.pstack .padd{flex:0 0 auto; width:100%;}
.pfull,.pmain{height:96px;}
.padd{position:relative; display:flex; align-items:center; justify-content:center; border:1.5px dashed var(--line); background:transparent; border-radius:11px; color:var(--muted); font-size:20px; cursor:pointer; transition:border-color .15s,color .15s,background .15s; overflow:hidden;}
.padd:hover{border-color:var(--accent); color:var(--accent); background:var(--accent-soft);}
.pcard{position:relative; border-radius:11px; overflow:hidden; cursor:pointer; background:var(--chip); box-shadow:inset 0 0 0 1px rgba(255,255,255,.05); transition:box-shadow .15s, transform .15s;}
.pcard:hover{box-shadow:0 6px 16px rgba(0,0,0,.22); transform:translateY(-2px);}
.pcard .pbg{position:absolute; inset:0; width:100%; height:100%; object-fit:cover;}
.pcard .pemoji{position:absolute; inset:0; display:flex; align-items:center; justify-content:center; font-size:30px; color:var(--ink); opacity:.85;}
.pcard .pshade{position:absolute; inset:0; background:linear-gradient(to top, rgba(0,0,0,.82) 0%, rgba(0,0,0,.32) 44%, rgba(0,0,0,0) 76%);}
.pcard .pname{position:absolute; left:9px; right:9px; bottom:8px; color:#fff; font-size:12.5px; font-weight:650; line-height:1.2; text-shadow:0 1px 3px rgba(0,0,0,.75); z-index:2;}
.pcard .pwith{position:absolute; top:5px; left:5px; z-index:3; border:none; background:rgba(0,0,0,.6); color:#fff; font-size:9px; font-weight:700; text-transform:capitalize; padding:2px 7px; border-radius:999px; cursor:pointer;}
.pcard .pwith:hover{background:var(--accent);}
.pclear{position:absolute; top:6px; right:6px; width:19px; height:19px; border-radius:50%; border:none; background:rgba(0,0,0,.6); color:#fff; font-size:10px; line-height:1; cursor:pointer; display:none; align-items:center; justify-content:center; z-index:3;}
.pcard:hover .pclear{display:flex;}
/* lunch = main + paired side */
.pstack{display:flex; flex-direction:column; gap:8px;}
.pside{height:92px;}
.pside .pname{font-size:11px; bottom:7px; left:8px; right:8px;}
.padd.pside{font-size:11px; font-weight:600; color:var(--muted); border-radius:11px;}
/* picker modal */
.picker-modal{max-width:580px;}
.picker-head{display:flex; align-items:center; justify-content:space-between; margin-bottom:12px;}
.picker-head h3{margin:0;}
.picker-grid{display:grid; grid-template-columns:repeat(auto-fill,minmax(124px,1fr)); gap:10px; max-height:54vh; overflow:auto; padding:2px;}
.pickcat{grid-column:1/-1; font-size:10.5px; text-transform:uppercase; letter-spacing:.5px; color:var(--muted); font-weight:700; margin-top:4px;}
.pickitem{position:relative; height:92px; border-radius:11px; overflow:hidden; cursor:pointer; background:var(--chip); transition:transform .12s, box-shadow .12s;}
.pickitem:hover{transform:translateY(-2px); box-shadow:0 5px 14px rgba(0,0,0,.16);}
.pickitem .pbg{position:absolute; inset:0; width:100%; height:100%; object-fit:cover;}
.pickitem .pemoji{position:absolute; inset:0; display:flex; align-items:center; justify-content:center; font-size:30px; color:var(--ink);}
.pickitem .pshade{position:absolute; inset:0; background:linear-gradient(to top, rgba(0,0,0,.8) 0%, rgba(0,0,0,.28) 46%, rgba(0,0,0,0) 78%);}
.pickitem .pname{position:absolute; left:8px; right:8px; bottom:7px; color:#fff; font-size:11.5px; font-weight:650; line-height:1.2; text-shadow:0 1px 3px rgba(0,0,0,.7);}
/* ---- grocery ---- */
.gcat{margin-bottom:16px;}
.gcat h4{font-size:12px; margin-bottom:6px; color:var(--muted); text-transform:uppercase; letter-spacing:.4px;}
.gitem{display:flex; align-items:center; gap:9px; background:var(--card); border:1px solid var(--line); border-radius:9px; padding:8px 11px; margin-bottom:6px; font-size:13.5px;}
.gitem input{width:17px; height:17px; accent-color:var(--accent); cursor:pointer;}
.gitem.have{background:var(--good); border-color:var(--line);}
.gitem.have span.nm{text-decoration:line-through; color:var(--good-ink);}
.gitem .cnt{margin-left:auto; font-size:11px; color:var(--muted); background:var(--chip); border-radius:999px; padding:1px 8px;}
.empty{color:var(--muted); font-size:13px; padding:18px; text-align:center; border:1px dashed var(--line); border-radius:12px;}
/* ---- modal ---- */
.overlay{position:fixed; inset:0; background:rgba(0,0,0,.5); display:none; align-items:center; justify-content:center; padding:18px; z-index:50;}
.overlay.show{display:flex;}
.modal{background:var(--card); border-radius:16px; width:100%; max-width:440px; max-height:90vh; overflow:auto; padding:20px;}
.modal h3{font-size:17px; margin-bottom:14px;}
.field{margin-bottom:12px;} .field label{display:block; font-size:12px; font-weight:700; color:var(--muted); margin-bottom:5px; text-transform:uppercase; letter-spacing:.3px;}
.field input[type=text], .field textarea, .field select{width:100%; border:1px solid var(--line); border-radius:9px; padding:9px 10px; font-size:14px; font-family:inherit; color:var(--ink); background:var(--card);}
.field textarea{resize:vertical; min-height:54px;}
.checks{display:flex; gap:14px;} .checks label{display:flex; align-items:center; gap:6px; font-size:13px; font-weight:600; text-transform:none; letter-spacing:0; color:var(--ink);}
.checks input{width:16px; height:16px; accent-color:var(--accent);}
.rate-edit{display:flex; align-items:center; gap:8px; flex-wrap:wrap;}
.rate-edit span{font-size:13px; font-weight:600; color:var(--ink);}
.rate-edit select{width:auto; padding:6px 8px;}
.imgrow{display:flex; gap:12px; align-items:center;}
.imgprev{width:64px; height:64px; border-radius:10px; background:var(--bg); border:1px solid var(--line); display:flex; align-items:center; justify-content:center; font-size:28px; overflow:hidden; flex-shrink:0;}
.imgprev img{width:100%; height:100%; object-fit:cover;}
.imgbtns{display:flex; flex-direction:column; gap:6px;}
.modal-actions{display:flex; gap:8px; margin-top:18px; justify-content:flex-end; flex-wrap:wrap;}
.modal-actions .spacer{flex:1;}
@media(max-width:760px){
  .app{flex-direction:column;}
  .nav{position:fixed; bottom:0; left:0; right:0; width:auto; flex-direction:row; justify-content:space-around; align-items:stretch; gap:2px; padding:3px 5px calc(3px + env(safe-area-inset-bottom)); border-right:none; border-top:1px solid var(--line); z-index:50; box-shadow:0 -2px 12px rgba(0,0,0,.12);}
  .nav .brand{display:none;}
  .nav button{flex:1; flex-direction:column; gap:2px; font-size:8.5px; padding:4px 2px; text-align:center; justify-content:center; border-radius:9px;}
  .nav .ico{font-size:15px;}
  .nav button.active{background:transparent; color:var(--accent);}
  .nav .theme{margin-top:0;}
  .main{padding:12px 12px 58px;}
  .libwrap{flex-direction:column;} .catcol{width:100%; position:static; display:flex; flex-wrap:wrap; align-items:center;} .catcol .cap{width:100%;} .catcol button{width:auto;}
  .viewhead{margin-bottom:8px;} .viewhead h2{font-size:18px;} .viewhead p.sub{display:none;}
  /* compact planner so a day column fits the screen height (only days scroll sideways) */
  .pday{min-width:150px;}
  .pday-head{padding:6px 6px;}
  .pday-head .pd-num{font-size:14px;}
  .pgroup{padding:9px 8px; gap:5px;}
  .pglabel{font-size:9px;}
  .pfull,.pmain{height:62px;}
  .pside{height:54px;}
  .pcard .pname{font-size:10.5px; bottom:5px;}
}
</style>
</head>
<body>
<div class="app">
  <nav class="nav">
    <div class="brand">🍽️ Menu Planner</div>
    <button data-view="library" class="active"><span class="ico">📚</span> Food Library</button>
    <button data-view="planner"><span class="ico">📅</span> Weekly Planner</button>
    <button class="theme" id="themeBtn"><span class="ico">🌙</span> Dark mode</button>
  </nav>

  <main class="main">
    <!-- LIBRARY -->
    <section class="view active" id="library">
      <div class="viewhead">
        <div><h2>Food Library</h2><p class="sub">Browse by category. Click a card to edit, or hover to rate.</p></div>
      </div>
      <div class="libwrap">
        <aside class="catcol" id="catcol"></aside>
        <div class="blockcol">
          <div class="libbar">
            <h3 id="catTitle"></h3>
            <input type="text" class="search" id="search" placeholder="Search dishes…">
            <button class="btn primary" id="additem">＋ Add item</button>
          </div>
          <div class="blocks" id="blocks"></div>
        </div>
      </div>
    </section>

    <!-- PLANNER -->
    <section class="view" id="planner">
      <div class="viewhead">
        <div><h2>Weekly Planner</h2><p class="sub">Pick dishes for each meal — saved automatically.</p></div>
        <div class="toolbar">
          <button class="btn primary" id="autofill">✨ Auto-fill week</button>
          <label class="switch" title="Prefer dishes with high Health + Protein ratings"><input type="checkbox" id="healthyToggle"><span class="track"></span> 💪 Healthy</label>
          <button class="btn ghost" id="clearweek">Clear</button>
        </div>
      </div>
      <div class="planwrap"><div class="planboard" id="plangrid"></div></div>
    </section>

  </main>
</div>

<!-- MODAL -->
<div class="overlay" id="overlay">
  <div class="modal">
    <h3 id="modalTitle">Add item</h3>
    <div class="field"><label>Name</label><input type="text" id="f_name" placeholder="e.g. Paneer butter masala"></div>
    <div class="field"><label>Category</label>
      <select id="f_cat">
        <option value="breakfast">Breakfast</option>
        <option value="sabji">Sabji + Roti/Rice</option>
        <option value="nonRoutine">Non-routine</option>
        <option value="sides">Side / Salad</option>
      </select>
    </div>
    <div class="field" id="withField"><label>Goes with</label>
      <div class="checks"><label><input type="checkbox" id="f_roti"> Roti</label><label><input type="checkbox" id="f_rice"> Rice</label></div>
    </div>
    <div class="field"><label>Note (optional)</label><input type="text" id="f_note" placeholder="e.g. rice only if gravy"></div>
    <div class="field"><label>Ingredients (comma-separated, for grocery list)</label><textarea id="f_ing" placeholder="potato, onion, tomato, spices"></textarea></div>
    <div class="field"><label>Ratings (Auto = use built-in estimate)</label>
      <div class="rate-edit">
        <span>Healthy</span><select id="f_health"><option value="">Auto</option><option>1</option><option>2</option><option>3</option><option>4</option><option>5</option></select>
        <span>Protein</span><select id="f_protein"><option value="">Auto</option><option>1</option><option>2</option><option>3</option><option>4</option><option>5</option></select>
      </div>
    </div>

/* Curated, nutrition-grounded ratings {h:healthy 1-5, p:protein 1-5}. */
const RATINGS = {
  "Boiled egg & bread":{h:3,p:4}, "Poha":{h:4,p:2}, "Aloo / veg sandwich":{h:3,p:2},
  "Idli":{h:5,p:3}, "Uttapam":{h:4,p:3}, "Sevaiya (vermicelli)":{h:3,p:2},
  "Besan cheela":{h:4,p:4}, "Banana milkshake":{h:3,p:3}, "Paneer / Aloo paratha":{h:3,p:3},

  "Paneer butter masala":{h:2,p:4}, "Bhindi ki sabzi":{h:4,p:2}, "Cabbage":{h:5,p:2}, "Chole":{h:4,p:4},
  "Rajma":{h:4,p:4}, "Mix veg":{h:5,p:2}, "Sev tamatar":{h:3,p:2}, "Black channe":{h:5,p:4},
  "Daal":{h:5,p:4}, "Daal makhani":{h:3,p:4}, "Kadhi":{h:4,p:3},
  "Pav bhaji":{h:2,p:2}, "Noodles":{h:2,p:2}, "Pasta":{h:2,p:3}, "Dosa":{h:3,p:3},
  "Baigan ka bharta":{h:4,p:2}, "Pani puri":{h:2,p:2}, "Rava idli + aloo sabji":{h:3,p:2},
  "Poori + aloo sabji":{h:1,p:2}, "Paneer chili":{h:3,p:4}, "Tawa pullao":{h:3,p:2},
  "Pizza":{h:2,p:3}, "Egg fried rice":{h:3,p:3},

  "Cut cucumber & tomato":{h:5,p:1}, "Boondi raita":{h:3,p:2},
  "Ramen":{h:2,p:2}, "Veg grilled sandwich":{h:3,p:2}, "Greek yogurt":{h:5,p:4}, "Cut fruits":{h:5,p:1}
};
function nutrition(it){
  if(typeof it.health==="number" && typeof it.protein==="number") return {health:it.health, protein:it.protein};
  if(RATINGS[it.n]) return {health:RATINGS[it.n].h, protein:RATINGS[it.n].p};
  // heuristic fallback for custom dishes
  const ing = (it.ing||[]).map(s=>s.toLowerCase());
  const proHigh=["paneer","egg","soya","urad","chickpea","rajma","kidney bean","tofu"];
  const proMed=["dal","moong","sprout","channa","pea","cheese","milk","curd","peanut","cashew","besan","yogurt"];
  let pro=0;
  ing.forEach(i=>{ if(proHigh.some(k=>i.includes(k))) pro+=3; else if(proMed.some(k=>i.includes(k))) pro+=1.5; });
  const good=["spinach","palak","cauliflower","cabbage","carrot","bean","okra","bhindi","brinjal","tomato","onion","cucumber","pea","sprout","fruit","apple","banana","pomegranate","lemon","mint","moong","dal","chickpea","rajma","capsicum","curd","vegetable","egg"];
  const bad=["pizza base","cheese","butter","cream","sugar","sev","puri","poori","pav","noodle","pasta","sauce","mayon","deep fried"];
  let h=2.7;
  ing.forEach(i=>{ if(good.some(k=>i.includes(k))) h+=0.45; if(bad.some(k=>i.includes(k))) h-=0.8; });
  const clamp=x=>Math.max(1,Math.min(5,Math.round(x)));
  return {protein:clamp(1+pro), health:clamp(h)};
}
function renderCatCol(){
  const el = document.getElementById("catcol");
  let html = `<div class="cap">Categories</div>`;
  CATS.forEach(c=>{
    const m = CATMETA[c];
    html += `<button data-cat="${c}" class="${c===activeCat?'active':''}"><span class="cdot" style="background:${m.color}"></span>${m.label}<span class="cnt">${store.library[c].length}</span></button>`;
  });
  el.innerHTML = html;
  el.querySelectorAll("button").forEach(b=> b.addEventListener("click", ()=>{ activeCat=b.dataset.cat; renderCatCol(); renderRows(); }));
}
function renderRows(){
  document.getElementById("catTitle").innerHTML = `<span class="cdot" style="display:inline-block;width:11px;height:11px;border-radius:3px;background:${CATMETA[activeCat].color}"></span> ${CATMETA[activeCat].label}`;
  const wrap = document.getElementById("blocks");
  let items = store.library[activeCat];
  if(searchTerm) items = items.filter(it=> it.n.toLowerCase().includes(searchTerm));
  const rateClass = {dislike:"rate-dislike", ok:"rate-ok", love:"rate-love"};
  const dots = (n,cls)=>{ let s=""; for(let k=0;k<5;k++) s+=`<i class="${k<n?'on':''}"></i>`; return `<span class="bar ${cls}">${s}</span>`; };
  let html = "";
  if(!items.length && searchTerm) html += `<div class="muted" style="padding:10px">No dishes match your search.</div>`;
  items.forEach(it=>{
    const thumb = it.img ? `<img src="${it.img}" alt="">` : CATMETA[it.cat].emoji;
    const tags = (it.with && it.with.length) ? `<div class="tags">`+it.with.map(w=>`<span class="tag ${w}">${w}</span>`).join("")+`</div>` : "";
    const r = it.rate || "";
    const nut = nutrition(it);
    html += `<div class="block ${rateClass[r]||""}" data-id="${it.id}">
      <button class="del" data-del="${it.id}" title="Delete">✕</button>
      <div class="thumb">${thumb}</div>
      <div class="body">
        <h4>${it.n}</h4>${it.note?`<div class="note">${it.note}</div>`:""}${tags}
        <div class="meters">
          <span class="m" title="Healthy ${nut.health}/5"><span class="lbl">Healthy</span> ${dots(nut.health,'health')}</span>
          <span class="m" title="Protein ${nut.protein}/5"><span class="lbl">Protein</span> ${dots(nut.protein,'protein')}</span>
        </div>
      </div>
      <div class="rate">
        <button class="dislike ${r==='dislike'?'on':''}" data-rate="dislike" data-id="${it.id}" title="Don't like">👎</button>
        <button class="ok ${r==='ok'?'on':''}" data-rate="ok" data-id="${it.id}" title="Don't mind">😐</button>
        <button class="love ${r==='love'?'on':''}" data-rate="love" data-id="${it.id}" title="Love it">❤️</button>
      </div>
    </div>`;
  });
  html += `<div class="addblock" id="addblock">＋ Add item</div>`;
  wrap.innerHTML = html;
  wrap.querySelectorAll(".block[data-id]").forEach(b=> b.addEventListener("click", e=>{
    if(e.target.dataset.del){ removeItem(e.target.dataset.del); return; }
    if(e.target.dataset.rate) return;
    openForm(getItem(b.dataset.id));
  }));
  wrap.querySelectorAll("[data-rate]").forEach(btn=> btn.addEventListener("click", e=>{
    e.stopPropagation();
    const it = getItem(btn.dataset.id); if(!it) return;
    it.rate = (it.rate===btn.dataset.rate) ? null : btn.dataset.rate;
    save(); renderRows();
  }));
  const ab = document.getElementById("addblock"); if(ab) ab.addEventListener("click", ()=> openForm(null, activeCat));
}

function openForm(item, presetCat){
  editingId = item?item.id:null; pendingImg = item?item.img:null;
  F("modalTitle").textContent = item?"Edit item":"Add item";
  F("f_name").value = item?item.n:"";

  F("f_note").value = item?(item.note||""):"";
  F("f_ing").value = item?(item.ing||[]).join(", "):"";
  F("f_roti").checked = item&&item.with?item.with.includes("roti"):false;
  F("f_rice").checked = item&&item.with?item.with.includes("rice"):false;
  F("f_health").value = item&&typeof item.health==="number"?String(item.health):"";
  F("f_protein").value = item&&typeof item.protein==="number"?String(item.protein):"";
  F("deleteBtn").style.display = item?"inline-block":"none";

}

F("fileInput").addEventListener("change", e=>{
  const file=e.target.files[0]; if(!file) return;
  const r=new FileReader();
  r.onload=ev=>{ const img=new Image(); img.onload=()=>{
    const max=160, sc=Math.min(1,max/Math.max(img.width,img.height));
    const cw=Math.round(img.width*sc), ch=Math.round(img.height*sc);
    const cv=document.createElement("canvas"); cv.width=cw; cv.height=ch;
    cv.getContext("2d").drawImage(img,0,0,cw,ch);
    pendingImg=cv.toDataURL("image/jpeg",0.8); setPreview();
  }; img.src=ev.target.result; };
  r.readAsDataURL(file); e.target.value="";
});

  const name=F("f_name").value.trim(); if(!name){ alert("Please enter a name."); return; }

  if(cat==="sabji"){ withArr=[]; if(F("f_roti").checked)withArr.push("roti"); if(F("f_rice").checked)withArr.push("rice"); if(!withArr.length)withArr=["roti"]; }
  const ing=F("f_ing").value.split(",").map(s=>s.trim()).filter(Boolean);
  const note=F("f_note").value.trim();
  const hv=F("f_health").value, pv=F("f_protein").value;
  if(editingId){
    const it=getItem(editingId);
    if(it.cat!==cat){ store.library[it.cat]=store.library[it.cat].filter(x=>x.id!==it.id); store.library[cat].push(it); }
    Object.assign(it,{n:name,cat,with:withArr,note,ing,img:pendingImg});
    if(hv!=="") it.health=+hv; else delete it.health;
    if(pv!=="") it.protein=+pv; else delete it.protein;
  } else {
    const ni={id:uid(),n:name,cat,with:withArr,note,ing,img:pendingImg,rate:null};
    if(hv!=="") ni.health=+hv; if(pv!=="") ni.protein=+pv;
    store.library[cat].push(ni);
  }
  save(); closeForm(); activeCat=cat; renderCatCol(); renderRows();
});
F("deleteBtn").addEventListener("click", ()=>{ if(editingId) removeItem(editingId); });
function removeItem(id){
  const it=getItem(id); if(!it) return;
  if(!confirm(`Remove "${it.n}"?`)) return;
  store.library[it.cat]=store.library[it.cat].filter(x=>x.id!==id);
  Object.keys(store.plan).forEach(k=>{ if(store.plan[k]&&store.plan[k].id===id) delete store.plan[k]; });
  save(); closeForm(); renderCatCol(); renderRows(); renderPlanner();
}
document.getElementById("additem").addEventListener("click", ()=> openForm(null, activeCat));

/* ---------- planner (calendar grid) ---------- */
const DSHORT = ["Mon","Tue","Wed","Thu","Fri","Sat","Sun"];
function weekDates(){
  const now=new Date(); const off=(now.getDay()+6)%7; // 0=Mon
  const mon=new Date(now); mon.setHours(0,0,0,0); mon.setDate(now.getDate()-off);
  return DAYS.map((_,i)=>{ const d=new Date(mon); d.setDate(mon.getDate()+i); return d; });
}
function renderPlanner(){
  const el = document.getElementById("plangrid");
  const wd = weekDates(), todayStr = new Date().toDateString();
  let html = "";
  DAYS.forEach((day,di)=>{
    const d=wd[di], today=d.toDateString()===todayStr;
    html += `<div class="pday${today?' today':''}">
      <div class="pday-head"><span class="pd-day">${DSHORT[di]}</span><span class="pd-num">${d.getDate()}</span></div>
      <div class="pgroup">
        <div class="pglabel"><span class="mdot" style="background:${CATMETA.breakfast.color}"></span>Breakfast</div>
        ${cellHtml(di,"breakfast","pfull")}
      </div>
      <div class="pgroup">
        <div class="pglabel"><span class="mdot" style="background:${CATMETA.sabji.color}"></span>Lunch</div>
        <div class="pstack">${cellHtml(di,"lunch","pmain")}${cellHtml(di,"lunchSide","pside","＋ Side / salad")}</div>
      </div>
      <div class="pgroup">
        <div class="pglabel"><span class="mdot" style="background:${CATMETA.nonRoutine.color}"></span>Dinner</div>
        ${cellHtml(di,"dinner","pfull")}
      </div>
    </div>`;
  });
  el.innerHTML = html;
  el.querySelectorAll(".pcard").forEach(c=> c.addEventListener("click", e=>{
    if(e.target.dataset.clear){ store.plan[e.target.dataset.clear]={}; save(); renderPlanner(); return; }
    if(e.target.classList.contains("pwith")) return;
    openPicker(+c.dataset.di, c.dataset.slot);
  }));
  el.querySelectorAll(".padd").forEach(b=> b.addEventListener("click", ()=> openPicker(+b.dataset.di, b.dataset.slot)));
  el.querySelectorAll(".pwith").forEach(btn=> btn.addEventListener("click", e=>{
    e.stopPropagation();
    const cell=btn.dataset.cell, it=getItem(store.plan[cell].id); if(!it) return;
    const opts = it.with.length>1 ? it.with.concat("both") : it.with.slice();
    const cur = store.plan[cell].with || it.with[0];
    store.plan[cell].with = opts[(opts.indexOf(cur)+1)%opts.length];
    save(); renderPlanner();
  }));
}
function withLabel(w){ return w==="both" ? "roti + rice" : w; }
function cellHtml(di, slotKey, klass, ph){
  const cell = di+"_"+slotKey;
  let cur = store.plan[cell] || {};
  if(cur.name && !cur.id){ const it=findByName(cur.name); if(it) cur.id=it.id; }
  const it = cur.id ? getItem(cur.id) : null;
  if(it){
    const bg = it.img ? `<img class="pbg" src="${it.img}" alt=""><div class="pshade"></div>` : `<span class="pemoji">${CATMETA[it.cat].emoji}</span><div class="pshade"></div>`;
    let withPill = "";
    if(it.with && it.with.length) withPill = `<button class="pwith" data-cell="${cell}" title="Toggle roti / rice">${withLabel(cur.with||it.with[0])}</button>`;
    return `<div class="pcard ${klass||''}" data-cell="${cell}" data-di="${di}" data-slot="${slotKey}">${bg}<button class="pclear" data-clear="${cell}" title="Remove">✕</button>${withPill}<div class="pname">${it.n}</div></div>`;
  }
  return `<button class="padd ${klass||''}" data-di="${di}" data-slot="${slotKey}">${ph||"+"}</button>`;
}
/* picker */
let pickerCtx = null;
const pickerOverlay = document.getElementById("pickerOverlay");
function openPicker(di, slotKey){
  pickerCtx = {di, slotKey};
  document.getElementById("pickerTitle").textContent = `${DAYS[di]} · ${slotLabel(slotKey)}`;
  document.getElementById("pickerSearch").value = "";
  buildPicker("");
  pickerOverlay.classList.add("show");
}
function buildPicker(term){
  const cats = PICK_FROM[pickerCtx.slotKey] || [];
  const grid = document.getElementById("pickerGrid");
  let html = "";
  cats.forEach(cat=>{
    let items = store.library[cat];
    if(term) items = items.filter(it=>it.n.toLowerCase().includes(term));
    if(!items.length) return;
    html += `<div class="pickcat">${CATMETA[cat].label}</div>`;
    items.forEach(it=>{
      const bg = it.img ? `<img class="pbg" src="${it.img}" alt=""><div class="pshade"></div>` : `<span class="pemoji">${CATMETA[cat].emoji}</span><div class="pshade"></div>`;
      html += `<div class="pickitem" data-id="${it.id}">${bg}<div class="pname">${it.n}</div></div>`;
    });
  });
  grid.innerHTML = html || `<div class="muted" style="padding:12px">No dishes found.</div>`;
  grid.querySelectorAll(".pickitem").forEach(b=> b.addEventListener("click", ()=>{
    const it = getItem(b.dataset.id);
    const di = pickerCtx.di, sk = pickerCtx.slotKey;
    // Rule: lunch and dinner can't be the same dish
    if(sk==="dinner" && (store.plan[di+"_lunch"]||{}).id===it.id){ alert("Lunch and dinner can't be the same dish."); return; }
    if(sk==="lunch" && (store.plan[di+"_dinner"]||{}).id===it.id){ alert("Lunch and dinner can't be the same dish."); return; }
    const e = {id:it.id}; if(it.with && it.with.length) e.with = it.with[0];
    store.plan[di+"_"+sk] = e; save(); pickerOverlay.classList.remove("show"); renderPlanner();
  }));
}
document.getElementById("pickerSearch").addEventListener("input", e=> buildPicker(e.target.value.trim().toLowerCase()));
document.getElementById("pickerClose").addEventListener("click", ()=> pickerOverlay.classList.remove("show"));
pickerOverlay.addEventListener("click", e=>{ if(e.target===pickerOverlay) pickerOverlay.classList.remove("show"); });
document.getElementById("pickerClear").addEventListener("click", ()=>{
  if(!pickerCtx) return;
  store.plan[pickerCtx.di+"_"+pickerCtx.slotKey] = {}; save();
  pickerOverlay.classList.remove("show"); renderPlanner();
});
function pick(a){ return a[Math.floor(Math.random()*a.length)]; }
function dishScore(it){ const n=nutrition(it); return n.health + n.protein; }   // 2..10
function fillWeek(healthy){
  const recent={breakfast:[],lunch:[],lunchSide:[],dinner:[]};
  function avoidRecent(pool,key){ let a=pool.filter(it=>!recent[key].slice(-3).includes(it.id)); return a.length?a:pool; }
  function pickRandom(pool,key){ if(!pool||!pool.length) return null; const a=avoidRecent(pool,key); const it=pick(a); recent[key].push(it.id); return it; }
  function pickHealthy(pool,key){
    if(!pool||!pool.length) return null;
    const a=avoidRecent(pool,key);
    const w=a.map(it=>Math.pow(dishScore(it),3));       // strongly favour higher health+protein
    let total=w.reduce((x,y)=>x+y,0), r=Math.random()*total, idx=a.length-1;
    for(let i=0;i<a.length;i++){ r-=w[i]; if(r<=0){ idx=i; break; } }
    const it=a[idx]; recent[key].push(it.id); return it;
  }
  const choose = healthy ? pickHealthy : pickRandom;
  function setPlan(di,slot,it){ const cell=di+"_"+slot; if(!it){ store.plan[cell]={}; return it; } const e={id:it.id}; if(it.with&&it.with.length) e.with=it.with[0]; store.plan[cell]=e; return it; }
  DAYS.forEach((day,di)=>{
    setPlan(di,"breakfast", choose(store.library.breakfast,"breakfast"));
    const lunch = setPlan(di,"lunch", choose(store.library.sabji,"lunch"));         // rule 3: lunch = sabji
    setPlan(di,"lunchSide", choose(store.library.sides,"lunchSide"));               // rule 4: lunch paired with side
    // rule 5: dinner mostly non-routine, sometimes sabji. rule 1: not same as lunch
    let pool;
    if(healthy){ pool = (store.library.nonRoutine||[]).concat(store.library.sabji||[]); }   // healthy: pick best of both
    else { pool = (Math.random()<0.75 ? store.library.nonRoutine : store.library.sabji); if(!pool||!pool.length) pool=(store.library.nonRoutine||[]).concat(store.library.sabji||[]); }
    let dinner=null, tries=0;
    do { dinner = choose(pool,"dinner"); tries++; } while(dinner && lunch && dinner.id===lunch.id && tries<10);
    setPlan(di,"dinner", dinner);
  });
  save(); renderPlanner();
}
const healthyToggle = document.getElementById("healthyToggle");
healthyToggle.checked = !!store.healthy;
document.getElementById("autofill").addEventListener("click", ()=> fillWeek(healthyToggle.checked));
healthyToggle.addEventListener("change", ()=>{ store.healthy = healthyToggle.checked; save(); });
document.getElementById("clearweek").addEventListener("click", ()=>{ if(confirm("Clear the whole week?")){ store.plan={}; save(); renderPlanner(); } });

/* ---------- init ---------- */
renderCatCol(); renderRows(); renderPlanner();
</script>
